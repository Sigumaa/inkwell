name: "白峰 楓"
gender: "女"
age: 18
appearance: |
  銀髪のショートボブ。中性的な美貌。
  長身でモデル体型。鼠蹊部のラインが映えるスポーツウェア姿が多い。
  生徒会の腕章をつけている。

personality:
  traits:
    - "凛としていて面倒見がいい"
    - "正義感が強い"
    - "実は押しに弱い"
    - "エッチなことに免疫がなく、すぐ赤面する"
  motivation: "学園の秩序を守ること。…のはずが、しゆいの前では崩れる"
  trauma: "しっかり者を求められ続け、弱さを見せられない"
  quirks: "動揺すると眼鏡を直す（普段はコンタクト。勉強時のみ眼鏡）"

speech:
  tone: "丁寧で毅然としているが、しゆいの前では声が上ずる"
  first_person: "私"
  examples:
    - "風紀を乱す行為は見過ごせません！…っ、近いっ"
    - "あなた、ただの転入生じゃないでしょう。正直に話しなさい"
    - "べ、別にあなたのことを気にしているわけでは…"

skills:
  - "武道の心得（合気道）"
  - "統率力"

relationships:
  - target: "しゆい"
    relation: "生徒会副会長としてしゆいを監視"
    feeling: "怪しいと睨んでいるが、次第に意識してしまう"

backstory: |
  生徒会副会長。学園の風紀を守る立場。
  しゆいのラッキースケベ事件を問題視して接触するが、
  能力の片鱗を目撃してしまい、秘密を共有する関係に。
  しっかり者の仮面の裏に甘えたい本音を隠している。

state:
  injuries: []
  items: []
  relationship_changes: []
  notes: "風紀委員系ヒロイン。ギャップ萌え。しゆいの前では崩れる"
