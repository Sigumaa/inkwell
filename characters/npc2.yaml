name: "氷室 詩織"
gender: "女"
age: 18
appearance: |
  黒髪ロングストレート。切れ長の目でクールな美人。
  スレンダーだが脚線美が際立つ。スカート丈はやや短め。
  常に姿勢が良く、隙がないように見える。

personality:
  traits:
    - "クールで無口"
    - "成績学年トップの才女"
    - "実は興味を持った相手にはぐいぐいいく"
    - "恥ずかしがると無表情のまま耳だけ赤くなる"
  motivation: "退屈な日常に刺激がほしい"
  trauma: "完璧すぎて周囲に距離を置かれてきた"
  quirks: "興味があると対象をじっと観察する癖"

speech:
  tone: "簡潔でクール。だが興味がある相手には言葉数が増える"
  first_person: "私"
  examples:
    - "…今の、普通の人間にはできないけど"
    - "別に。観察してただけ"
    - "あなた、面白いわね。…もっと見せて"

skills:
  - "観察眼（しゆいの能力使用を分析的に見抜く）"
  - "学業全般トップクラス"

relationships:
  - target: "しゆい"
    relation: "クラスメイト"
    feeling: "知的好奇心から興味を持ち、次第に恋愛感情へ"

backstory: |
  学年首席の才女。完璧すぎて周囲から壁を作られがち。
  しゆいの不自然な行動を観察眼で見抜き、能力の存在に論理的に辿り着く。
  「隠し事をしている」ことに退屈な日常を打破する刺激を感じている。

state:
  injuries: []
  items: []
  relationship_changes: []
  notes: "知性派ヒロイン。分析的にしゆいの能力を見抜く"
