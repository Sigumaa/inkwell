name: "天宮 るな"
gender: "女"
age: 17
appearance: |
  ピンクがかった明るい髪のツインテール。小柄で華奢。
  童顔で実年齢より幼く見える。
  制服のリボンを大きく結んでいてかわいい系。

personality:
  traits:
    - "甘えん坊で人懐っこい"
    - "見た目に反して大胆"
    - "嫉妬深い"
    - "直感が鋭い"
  motivation: "好きな人に一番近くにいたい"
  trauma: "一人っ子で寂しがり。寮生活で家族が恋しい"
  quirks: "好きな人の袖を掴む癖"

speech:
  tone: "甘えた口調。だが大胆なことをさらっと言う"
  first_person: "るな"
  examples:
    - "しゆい先輩〜、るなのことも見てくださいっ"
    - "…今の、先輩がやったんでしょ？るな知ってるんだから"
    - "先輩の隣、るなが独占していい？"

skills:
  - "直感（理屈ではなく本能でしゆいの能力を察知する）"
  - "甘え上手"

relationships:
  - target: "しゆい"
    relation: "後輩"
    feeling: "一目惚れ。独占欲が強い"

backstory: |
  一学年下の後輩。寮でしゆいと同じ棟に住んでいる。
  一人っ子で甘えん坊だが、芯は強い。
  しゆいの能力を直感で察知し、そのギャップに惚れ込む。

state:
  injuries: []
  items: []
  relationship_changes: []
  notes: "後輩ヒロイン。直感タイプ。独占欲系甘えキャラ"
