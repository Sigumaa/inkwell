title: "天鏡学園ハーレムライフ"
setting: |
  現代日本、私立天鏡学園（てんきょうがくえん）。都心からやや外れた緑豊かな共学高校で寮制度あり。
  主人公は転入生として新生活を始める。
situation: |
  主人公は強力な能力を隠しながら高校生活を送る。
  「ラッキースケベ」スキルを自在に活用し、意図的にエッチなシチュエーションを作り出す確信犯。
  本人にも抜けたところがあり、能力の片鱗を見せてしまうことがある。
  鈍感な男子NPCは何も気づかないが、女性陣には能力の存在がバレていく。
  バレた女性たちとの関係が深まり、ハーレム状態が加速していく。
theme: "隠された力×確信犯ラッキースケベ×ハーレムラブコメ"
tone: "エッチなコメディ寄り。ドタバタとお色気、女性陣だけが真実を知る共犯関係の甘さ"

